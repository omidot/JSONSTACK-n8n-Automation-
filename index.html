<!doctype html>
<html lang="en">
  <head>
    <script>
      // Make window.fetch writable/configurable or provide a setter to prevent errors in sandboxed environments
      (function() {
        try {
          var currentFetch = window.fetch;
          
          function defineProp(obj, prop) {
            try {
              Object.defineProperty(obj, prop, {
                get: function() {
                  return currentFetch;
                },
                set: function(val) {
                  currentFetch = val;
                },
                configurable: true,
                enumerable: true
              });
              return true;
            } catch (err) {
              return false;
            }
          }

          // Try defining it on window first
          if (!defineProp(window, 'fetch')) {
            // If failed, try defining on Window.prototype
            if (typeof Window !== 'undefined' && Window.prototype) {
              defineProp(Window.prototype, 'fetch');
            }
          }
        } catch (e) {
          console.warn('Sandbox fetch patch bypassed:', e);
        }
      })();
    </script>
